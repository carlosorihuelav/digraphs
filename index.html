<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Mi Cole · 1ro Básico</title>
<style>
  :root{ --ink:#2b2350; --shadow:0 10px 0 rgba(0,0,0,.12); }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    font-family:"Comic Sans MS","Chalkboard SE","Baloo 2",system-ui,-apple-system,sans-serif;
    background:linear-gradient(160deg,#fff4e6 0%,#ffe6f2 45%,#e6f2ff 100%);
    color:var(--ink); min-height:100%; overflow-x:hidden;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:1000px; margin:0 auto; padding:24px 18px 70px;}
  header{text-align:center; padding:10px 0 4px;}
  h1{font-size:clamp(34px,6.5vw,62px); margin:0; text-shadow:2px 3px 0 #fff, 4px 6px 0 rgba(0,0,0,.06);}
  .sub{font-size:clamp(16px,2.6vw,22px); opacity:.7; font-weight:bold; margin:6px 0 0;}

  .grade{margin-top:26px;}
  .gradetitle{display:flex; align-items:center; gap:12px; justify-content:center; font-size:clamp(22px,3.4vw,30px); font-weight:900; margin-bottom:6px;}
  .gradetitle .pill{background:#fff; border-radius:999px; padding:6px 18px; box-shadow:var(--shadow);}

  .subjects{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; margin-top:18px;}
  .subject{background:#fff; border-radius:30px; padding:20px 18px 22px; box-shadow:0 14px 0 rgba(0,0,0,.08);}
  .subject h2{display:flex; align-items:center; gap:10px; font-size:clamp(22px,3.4vw,30px); margin:0 0 12px;}
  .subject .dot{width:16px; height:16px; border-radius:50%;}

  .topics{display:flex; flex-direction:column; gap:12px;}
  .topic{
    display:flex; align-items:center; gap:14px; text-decoration:none; color:var(--ink);
    background:#faf8ff; border:4px solid #efeafc; border-radius:22px; padding:14px 16px;
    font-weight:900; font-size:clamp(18px,2.6vw,23px); transition:transform .1s ease;
  }
  .topic:active{transform:translateY(4px) scale(.99);}
  .topic .emoji{font-size:clamp(34px,6vw,46px); line-height:1;}
  .topic .go{margin-left:auto; font-size:24px; opacity:.6;}
  .topic.soon{opacity:.55; pointer-events:none; border-style:dashed;}
  .topic.soon .go{font-size:14px; opacity:.8; font-weight:bold; background:#eee; border-radius:999px; padding:4px 10px;}

  .subject.english{border-top:8px solid #ff6b9d;}
  .subject.math{border-top:8px solid #37c8a8;}
  .subject.spanish{border-top:8px solid #ffa931;}

  footer{text-align:center; margin-top:36px; opacity:.5; font-size:14px; font-weight:bold;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎒 Mi Cole</h1>
    <p class="sub">Aprende jugando · Learn &amp; play</p>
  </header>

  <section class="grade">
    <div class="gradetitle"><span class="pill">📘 1ro Básico</span></div>

    <div class="subjects">

      <div class="subject english">
        <h2><span class="dot" style="background:#ff6b9d"></span>🇬🇧 Inglés</h2>
        <div class="topics">
          <a class="topic" href="digraphs.html">
            <span class="emoji">🔤</span> Digraphs <span class="go">▶</span>
          </a>
          <a class="topic" href="prepositions.html">
            <span class="emoji">📍</span> Place Prepositions <span class="go">▶</span>
          </a>
        </div>
      </div>

      <div class="subject math">
        <h2><span class="dot" style="background:#37c8a8"></span>➗ Matemática</h2>
        <div class="topics">
          <span class="topic soon"><span class="emoji">🔢</span> Próximamente <span class="go">soon</span></span>
        </div>
      </div>

      <div class="subject spanish">
        <h2><span class="dot" style="background:#ffa931"></span>🇪🇸 Español</h2>
        <div class="topics">
          <span class="topic soon"><span class="emoji">📖</span> Próximamente <span class="go">soon</span></span>
        </div>
      </div>

    </div>
  </section>

  <footer>Made with ❤️ for a smart reader</footer>
</div>
</body>
</html>
